<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یادبگیرش - کدگذار مدرن</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-Variable-font-face.css" rel="stylesheet" />
    <style>
        body { margin: 0; font-family: 'Vazirmatn', sans-serif; background: #050505; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        #bg-motion { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
            background: radial-gradient(circle at 15% 50%, #4f46e5, transparent), 
                        radial-gradient(circle at 85% 30%, #e11d48, transparent);
            filter: blur(80px); animation: move 10s infinite alternate ease-in-out; }
        @keyframes move { from { transform: scale(1); filter: hue-rotate(0deg) blur(80px); } 
                          to { transform: scale(1.2); filter: hue-rotate(90deg) blur(100px); } }

        .container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); padding: 2rem; border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); text-align: center; }
        h1 { margin-top: 0; font-size: 1.6rem; margin-bottom: 15px; color: #fff; }
        
        .field-group { margin: 15px 0; position: relative; }
        textarea, input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; color: white; padding: 15px; box-sizing: border-box; font-family: inherit; }
        
        .controls { display: flex; gap: 5px; margin-bottom: 5px; justify-content: flex-end; }
        .btn-act { background: rgba(255,255,255,0.1); border: none; border-radius: 8px; color: #fff; padding: 5px 12px; 
            cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        .btn-act:hover { background: rgba(255,255,255,0.2); }

        .btns { display: flex; gap: 10px; margin-top: 10px; }
        button.main-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; 
            font-family: inherit; transition: 0.3s; }
        .btn-enc { background: #6366f1; color: white; }
        .btn-dec { background: #f43f5e; color: white; }
        button.main-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div id="bg-motion"></div>
    <div class="container">
        <h1>یادبگیرش</h1>
        
        <div class="field-group">
            <div class="controls">
                <button class="btn-act" onclick="pasteText('txt')">Paste</button>
                <button class="btn-act" onclick="copyText('txt')">Copy</button>
            </div>
            <textarea id="txt" placeholder="متن خود را وارد کنید..."></textarea>
        </div>

        <input type="password" id="key" placeholder="رمز عبور">

        <div class="btns">
            <button class="main-btn btn-enc" onclick="process(true)">کدگذاری</button>
            <button class="main-btn btn-dec" onclick="process(false)">بازگردانی</button>
        </div>

        <div class="field-group">
            <div class="controls">
                <button class="btn-act" onclick="copyText('res')">Copy</button>
            </div>
            <textarea id="res" readonly placeholder="نتیجه نمایش داده می‌شود..."></textarea>
        </div>
    </div>
